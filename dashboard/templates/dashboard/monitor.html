{% extends "dashboard/base.html" %}
{% block title %}Giám sát MQTT{% endblock %}
{% block page_title %}Giám sát MQTT{% endblock %}

{% block extra_head %}
<style>
  #page-content { padding: 0; display: flex; flex-direction: column; overflow: hidden; }
  .monitor-wrap { flex: 1; display: flex; flex-direction: column; height: calc(100vh - 56px); overflow: hidden; }

  /* Header bar */
  .mon-head {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    flex-shrink: 0;
  }
  .mon-conn-badge {
    display: flex; align-items: center; gap: 7px;
    padding: 5px 12px; border-radius: 99px; font-size: 12px; font-weight: 700;
    border: 1px solid;
  }
  .mon-conn-badge.connected    { background: rgba(74,222,128,.1); border-color: rgba(74,222,128,.28); color: var(--green); }
  .mon-conn-badge.disconnected { background: rgba(248,113,113,.1); border-color: rgba(248,113,113,.28); color: var(--red); }
  .mon-conn-badge .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .mon-conn-badge.connected .dot { animation: pulse-g 2s ease-in-out infinite; }

  .mon-broker { font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: var(--txt-2); }

  .mon-actions { margin-left: auto; display: flex; gap: 6px; }
  .mon-btn {
    padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border);
    background: none; color: var(--txt-2); font-family: inherit;
    font-size: 12.5px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all .2s;
  }
  .mon-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; }
  .mon-btn:hover { background: var(--bg-hover); color: var(--txt); }
  .mon-btn.active { background: var(--bg-active); color: var(--txt-active); border-color: var(--cyan-dim); }

  /* Filter chips */
  .filter-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .chip {
    padding: 3px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: none; color: var(--txt-2); font-size: 11.5px; font-weight: 600;
    cursor: pointer; font-family: 'JetBrains Mono', monospace;
    transition: all .15s;
  }
  .chip.active { background: var(--bg-active); color: var(--txt-active); border-color: var(--cyan-dim); }
  .chip:hover  { background: var(--bg-hover); color: var(--txt); }

  /* Message log */
  .msg-log {
    flex: 1;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.5;
  }
  .log-row {
    display: grid;
    grid-template-columns: 80px 180px 1fr auto;
    gap: 0;
    padding: 6px 18px;
    border-bottom: 1px solid rgba(255,255,255,.03);
    align-items: center;
    transition: background .1s;
    animation: fadeRow .25s ease both;
  }
  @keyframes fadeRow { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:none} }
  .log-row:hover { background: var(--bg-hover); }

  .log-time { color: var(--txt-3); font-size: 11px; }
  .log-topic { color: var(--cyan); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 12px; }
  .log-payload { color: var(--txt); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 12px; }
  .log-dir {
    font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px;
    white-space: nowrap;
  }
  .log-dir.sub { background: rgba(56,189,248,.12); color: var(--cyan); }
  .log-dir.pub { background: rgba(74,222,128,.12); color: var(--green); }
  .log-dir.sys { background: rgba(251,191,36,.12); color: var(--amber); }

  /* Highlight by type */
  .sub-bar {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    background: var(--bg-surface);
    display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    flex-wrap: wrap;
  }
  .pub-bar {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    background: var(--bg-surface);
    display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    flex-wrap: wrap;
  }
  .conn-bar {
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-surface);
    display: flex; gap: 8px; align-items: center; flex-shrink: 0;
    flex-wrap: wrap;
  }
  .input-text {
    height: 34px; padding: 0 10px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    color: var(--txt); font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    outline: none; transition: border-color .2s;
  }
  .input-text:focus { border-color: var(--cyan); }
  
  .sub-topic, .pub-topic {
    flex: 0 0 220px;
  }
  .pub-bar {
    padding: 10px 18px;
    border-top: 1px solid var(--border);
    background: var(--bg-surface);
    display: flex; gap: 8px; align-items: center; flex-shrink: 0;
  }
  .sub-topic, .pub-topic {
    flex: 0 0 220px;
    height: 38px; padding: 0 10px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    color: var(--txt); font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    outline: none; transition: border-color .2s;
  }
  .sub-topic:focus, .pub-topic:focus { border-color: var(--cyan); }
  .pub-payload {
    flex: 1; height: 38px; padding: 0 10px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    color: var(--txt); font-family: 'JetBrains Mono', monospace; font-size: 12.5px;
    outline: none; transition: border-color .2s;
  }
  .pub-payload:focus { border-color: var(--green); }
  .btn-subscribe, .btn-publish {
    height: 38px; padding: 0 16px; border-radius: 8px; border: none;
    font-family: inherit; font-size: 13px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; gap: 7px; flex-shrink: 0;
    transition: opacity .2s, transform .2s; color: #fff;
  }
  .btn-subscribe {
    background: linear-gradient(135deg, #0284c7, #0369a1);
    box-shadow: 0 2px 10px rgba(2,132,199,.3);
  }
  .btn-publish {
    background: linear-gradient(135deg, #059669, #047857);
    box-shadow: 0 2px 10px rgba(5,150,105,.3);
  }
  .btn-subscribe:hover, .btn-publish:hover { opacity: .88; transform: translateY(-1px); }
  .btn-subscribe svg, .btn-publish svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2; }
  @media (max-width: 600px) { .sub-topic, .pub-topic { flex: 0 0 140px; } }
</style>
{% endblock %}

{% block content %}
<div class="monitor-wrap">

  <!-- Header -->
  <div class="mon-head">
    <div class="mon-conn-badge disconnected" id="conn-badge">
      <span class="dot"></span>
      <span id="conn-status-text">Chưa kết nối</span>
    </div>

    <div class="filter-chips">
      <button class="chip active" data-f="all">Tất cả</button>
      <button class="chip" data-f="status">/status</button>
      <button class="chip" data-f="data">/data</button>
      <button class="chip" data-f="command">/command</button>
      <button class="chip" data-f="fault">fault</button>
    </div>

    <div class="mon-actions">
      <button class="mon-btn active" id="btn-autoscroll">
        <svg viewBox="0 0 24 24"><polyline points="7,13 12,18 17,13"/><polyline points="7,6 12,11 17,6"/></svg>
        Auto-scroll
      </button>
      <button class="mon-btn" id="btn-pause">
        <svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pause
      </button>
      <button class="mon-btn" id="btn-clear">
        <svg viewBox="0 0 24 24"><polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        Xóa
      </button>
    </div>
  </div>

  <!-- Connection bar -->
  <div class="conn-bar">
    <input type="text" class="input-text" id="conn-host" placeholder="Broker Host (VD: broker.hivemq.com)" value="{{ mqtt_config.broker_host|default:'127.0.0.1' }}" style="flex: 1; min-width: 150px;" />
    <input type="number" class="input-text" id="conn-port" placeholder="Port WS" value="{{ ws_port|default:9001 }}" style="width: 90px;" />
    <input type="text" class="input-text" id="conn-user" placeholder="Username (Tùy chọn)" value="{{ mqtt_config.username|default:'' }}" style="width: 140px;" />
    <input type="password" class="input-text" id="conn-pass" placeholder="Password (Tùy chọn)" value="{{ mqtt_config.password|default:'' }}" style="width: 140px;" />
    <button class="btn-subscribe" id="btn-connect" style="background: linear-gradient(135deg, #4f46e5, #4338ca); box-shadow: 0 2px 10px rgba(79,70,229,.3);">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      <span id="btn-connect-text">Kết nối</span>
    </button>
  </div>

  <!-- Log -->
  <div class="msg-log" id="msg-log" aria-live="polite" aria-label="Nhật ký MQTT">
    <div class="log-row" style="border-bottom:1px solid var(--border-strong);padding-top:8px;padding-bottom:8px">
      <span class="log-time" style="font-weight:700;color:var(--txt-2)">Giờ</span>
      <span class="log-topic" style="font-weight:700;color:var(--txt-2)">Topic</span>
      <span class="log-payload" style="font-weight:700;color:var(--txt-2)">Payload</span>
      <span class="log-dir" style="background:none;color:var(--txt-2)">Hướng</span>
    </div>
  </div>

  <!-- Subscribe bar -->
  <div class="sub-bar">
    <input type="text" class="sub-topic" id="sub-topic" placeholder="Topic muốn theo dõi" value="#" />
    <button class="btn-subscribe" id="btn-subscribe">
      <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
      Đăng ký (Subscribe)
    </button>
  </div>

  <!-- Publish bar -->
  <div class="pub-bar">
    <input type="text" class="pub-topic"   id="pub-topic"   placeholder="Topic muốn gửi" value="{{ mqtt_config.topic_prefix|default:'fanjet/basement' }}/F01/command" />
    <input type="text" class="pub-payload" id="pub-payload" placeholder='{"cmd":"ON"}' />
    <button class="btn-publish" id="btn-publish">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9"/></svg>
      Gửi (Publish)
    </button>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
<script>
(function(){
  var log       = document.getElementById('msg-log');
  var paused    = false;
  var autoScroll= true;
  var filter    = 'all';
  var PREFIX    = '{{ mqtt_config.topic_prefix|default:"fanjet/basement" }}';
  
  var brokerHost = '{{ mqtt_config.broker_host|default:"127.0.0.1" }}';
  if (brokerHost === 'localhost' || brokerHost === '127.0.0.1') {
    document.getElementById('conn-host').value = window.location.hostname || '127.0.0.1';
  }

  var client = null;
  var isMqttConnected = false;

  function now() {
    return new Date().toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }

  function matchFilter(row) {
    if(filter==='all') return true;
    if(filter==='fault') return row.fault;
    if(filter==='status')  return row.topic.includes('/status');
    if(filter==='data')    return row.topic.includes('/data') || row.topic.includes('/telemetry');
    if(filter==='command') return row.topic.includes('/command');
    return true;
  }

  function escapeHTML(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function addRow(msg) {
    if(!matchFilter(msg)) return;
    if(paused) return;
    var row = document.createElement('div');
    row.className = 'log-row' + (msg.fault ? ' fault' : '');
    var safePayload = escapeHTML(msg.payload);
    var safeTopic = escapeHTML(msg.topic);
    row.innerHTML =
      '<span class="log-time">'+now()+'</span>'+
      '<span class="log-topic" title="'+safeTopic+'">'+safeTopic+'</span>'+
      '<span class="log-payload" title="'+safePayload+'">'+safePayload+'</span>'+
      '<span class="log-dir '+msg.dir+'">'+msg.dir.toUpperCase()+'</span>';
    log.appendChild(row);
    if(autoScroll) log.scrollTop = log.scrollHeight;
  }

  function onConnectionLost(responseObject) {
    isMqttConnected = false;
    if (responseObject.errorCode !== 0) {
      console.error("MQTT Connection Lost: " + responseObject.errorMessage);
      addRow({topic: "$SYS", payload: "Mất kết nối: " + responseObject.errorMessage, dir: 'sys', fault: true});
    } else {
      addRow({topic: "$SYS", payload: "Đã ngắt kết nối an toàn", dir: 'sys'});
    }
    updateConnectionUI();
  }

  function updateConnectionUI() {
    var badge = document.getElementById('conn-badge');
    var statusText = document.getElementById('conn-status-text');
    var btnConnect = document.getElementById('btn-connect');
    var btnText = document.getElementById('btn-connect-text');
    
    if (isMqttConnected) {
      badge.className = 'mon-conn-badge connected';
      statusText.innerText = 'Đã kết nối';
      btnConnect.style.background = 'linear-gradient(135deg, #dc2626, #b91c1c)';
      btnConnect.style.boxShadow = '0 2px 10px rgba(220,38,38,.3)';
      btnText.innerText = 'Ngắt kết nối';
      btnConnect.querySelector('svg').innerHTML = '<path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>';
    } else {
      badge.className = 'mon-conn-badge disconnected';
      statusText.innerText = 'Chưa kết nối';
      btnConnect.style.background = 'linear-gradient(135deg, #4f46e5, #4338ca)';
      btnConnect.style.boxShadow = '0 2px 10px rgba(79,70,229,.3)';
      btnText.innerText = 'Kết nối';
      btnConnect.querySelector('svg').innerHTML = '<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>';
    }
  }

  function onMessageArrived(message) {
    var topic = message.destinationName;
    var payload = message.payloadString;
    var isFault = payload.includes('"tripped": true');
    console.log("MQTT Received:", topic, payload);
    addRow({topic: topic, payload: payload, dir: 'sub', fault: isFault});
  };

  function toggleConnection() {
    if (isMqttConnected) {
      if (client) client.disconnect();
      return;
    }

    var host = document.getElementById('conn-host').value.trim();
    var port = parseInt(document.getElementById('conn-port').value.trim()) || 9001;
    var user = document.getElementById('conn-user').value.trim();
    var pass = document.getElementById('conn-pass').value.trim();

    if (!host) {
      alert("Vui lòng nhập Broker Host");
      return;
    }

    var clientId = 'web-mon-' + Math.random().toString(16).substr(2, 8);
    client = new Paho.MQTT.Client(host, port, clientId);
    client.onConnectionLost = onConnectionLost;
    client.onMessageArrived = onMessageArrived;

    document.getElementById('conn-status-text').innerText = 'Đang kết nối...';

    console.log("Connecting to MQTT via WebSocket: " + host + ":" + port);
    var connectOptions = {
      onSuccess: function() {
        console.log("Connected to MQTT WebSocket!");
        isMqttConnected = true;
        updateConnectionUI();
        addRow({topic: "$SYS", payload: "Kết nối thành công tới " + host + ":" + port, dir: 'sys'});
        
        // Subscribe to default and custom
        var customTopic = document.getElementById('sub-topic').value.trim();
        if(customTopic) {
            client.subscribe(customTopic);
            console.log("Subscribed to " + customTopic);
            addRow({topic: "$SYS", payload: "Đã đăng ký: " + customTopic, dir: 'sys'});
        }
      },
      onFailure: function(e) {
        console.error("MQTT Connection failed: " + e.errorMessage);
        isMqttConnected = false;
        updateConnectionUI();
        addRow({topic: "$SYS", payload: "Kết nối thất bại: " + e.errorMessage, dir: 'sys', fault: true});
        alert("Lỗi kết nối tới Broker: " + e.errorMessage);
      },
      timeout: 10,
      keepAliveInterval: 30,
    };
    if (user) {
      connectOptions.userName = user;
      connectOptions.password = pass;
    }
    
    // Determine if we need secure wss:// connection based on current page or standard ports
    if (window.location.protocol === "https:" || port === 443 || port === 8084 || port === 8884) {
       connectOptions.useSSL = true;
    }
    
    try {
        client.connect(connectOptions);
    } catch (err) {
        alert("Không thể khởi tạo kết nối: " + err.message);
        document.getElementById('conn-status-text').innerText = 'Chưa kết nối';
    }
  }

  // Bind Connect button
  document.getElementById('btn-connect').addEventListener('click', toggleConnection);

  /* Filter chips */
  document.querySelectorAll('.chip').forEach(function(c){
    c.addEventListener('click', function(){
      document.querySelectorAll('.chip').forEach(function(x){ x.classList.remove('active'); });
      c.classList.add('active');
      filter = c.dataset.f;
    });
  });

  /* Controls */
  document.getElementById('btn-pause').addEventListener('click', function(){
    paused = !paused;
    this.classList.toggle('active', paused);
    this.querySelector('svg').innerHTML = paused
      ? '<polygon points="5,3 19,12 5,21"/>'
      : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  });

  document.getElementById('btn-autoscroll').addEventListener('click', function(){
    autoScroll = !autoScroll;
    this.classList.toggle('active', autoScroll);
  });

  document.getElementById('btn-clear').addEventListener('click', function(){
    var header = log.firstChild;
    log.innerHTML = '';
    log.appendChild(header);
  });

  /* Subscribe */
  document.getElementById('btn-subscribe').addEventListener('click', function(){
    var topic = document.getElementById('sub-topic').value.trim();
    if(!topic) {
        alert("Vui lòng nhập Topic cần theo dõi.");
        return;
    }
    if (isMqttConnected) {
        client.subscribe(topic);
        console.log("Subscribed to " + topic);
        addRow({topic: "$SYS", payload: "Đã đăng ký nhận tin từ topic: " + topic, dir: 'sys'});
    } else {
        alert("Chưa kết nối đến MQTT Broker!");
    }
  });

  document.getElementById('sub-topic').addEventListener('keydown', function(e){
    if(e.key==='Enter') document.getElementById('btn-subscribe').click();
  });

  /* Publish */
  document.getElementById('btn-publish').addEventListener('click', function(){
    var topic   = document.getElementById('pub-topic').value.trim();
    var payload = document.getElementById('pub-payload').value.trim();
    if(!topic||!payload) {
        console.warn("Topic or payload is empty.");
        return;
    }
    
    console.log("MQTT Send Button Clicked:", topic, payload);
    
    // Ghi log trên giao diện
    addRow({topic:topic, payload:payload, dir:'pub'});
    
    // Thực sự Publish qua MQTT
    if (isMqttConnected) {
        try {
            var message = new Paho.MQTT.Message(payload);
            message.destinationName = topic;
            client.send(message);
            console.log("MQTT Message Sent successfully.");
        } catch (err) {
            console.error("Error sending MQTT message:", err);
            alert("Lỗi khi gửi bản tin: " + err.message);
        }
    } else {
        alert("Chưa kết nối đến MQTT Broker! Vui lòng chờ kết nối.");
    }
    
    document.getElementById('pub-payload').value='';
  });
  
  document.getElementById('pub-payload').addEventListener('keydown', function(e){
    if(e.key==='Enter') document.getElementById('btn-publish').click();
  });
})();
</script>
{% endblock %}
